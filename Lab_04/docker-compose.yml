version: "3.9"

services:
  diabetes-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: diabetes-api:latest
    container_name: diabetes-api
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./model:/app/model
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: diabetes-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - diabetes-api
    restart: unless-stopped