<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Progression Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #bd00ff;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --low:    #00f2ff;
            --medium: #f59e0b;
            --high:   #ef4444;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f172a);
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, var(--secondary), transparent 70%);
            opacity: 0.2; filter: blur(80px); z-index: -1;
            animation: float 10s infinite alternate;
        }

        body::after {
            content: '';
            position: fixed; bottom: -10%; right: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            opacity: 0.2; filter: blur(80px); z-index: -1;
            animation: float 10s infinite alternate-reverse;
        }

        @keyframes float {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .container {
            display: grid;
            gap: 2rem;
            width: 90%;
            max-width: 500px;
            padding: 2rem 0;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            text-align: center;
            margin: 0 0 0.4rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.78rem;
            color: #64748b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Status pill */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.8rem;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #64748b;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.online {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1.5px;
        }

        .status-text.online { color: var(--primary); }

        /* Grid inputs */
        .inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .field-hint {
            font-size: 0.65rem;
            color: #475569;
            line-height: 1.3;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        input[type="number"]::placeholder { color: #334155; }

        /* Button row */
        .btn-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }

        button.submit-btn {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        button.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        button.sample-btn {
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #94a3b8;
            font-family: 'Roboto', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            letter-spacing: 0.5px;
        }

        button.sample-btn:hover { border-color: #94a3b8; color: #e2e8f0; }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error banner */
        #errorBanner {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            margin-top: 1rem;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        /* Result area */
        .result-container {
            margin-top: 1.8rem;
            opacity: 0;
            transform: translateY(16px);
            display: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .result-container.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .result-inner {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.6rem;
            text-align: center;
        }

        .score-label {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 0.3rem;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.2rem;
        }

        .risk-badge {
            display: inline-block;
            padding: 8px 22px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            transition: all 0.4s ease;
        }

        .risk-badge.low    { background: rgba(0,242,255,0.1);  border: 1px solid rgba(0,242,255,0.4);  color: var(--low);    box-shadow: 0 0 12px rgba(0,242,255,0.15); }
        .risk-badge.medium { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.4); color: var(--medium); box-shadow: 0 0 12px rgba(245,158,11,0.15); }
        .risk-badge.high   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.4);  color: var(--high);   box-shadow: 0 0 12px rgba(239,68,68,0.15); }

        .risk-desc {
            font-size: 0.78rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }

        /* Progress bar */
        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #475569;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .bar-track {
            height: 6px;
            background: rgba(0,0,0,0.4);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .bar-fill {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">

        <h1>DIABETIX</h1>
        <p class="subtitle">Progression Predictor · Ridge Regression</p>

        <!-- API status -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">CONNECTING...</span>
        </div>

        <form id="predictionForm">
            <div class="inputs-grid">

                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Age (normalised)</span>
                </div>

                <div class="input-group">
                    <label for="sex">Sex</label>
                    <input type="number" id="sex" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Sex (normalised)</span>
                </div>

                <div class="input-group">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Body Mass Index</span>
                </div>

                <div class="input-group">
                    <label for="bp">BP</label>
                    <input type="number" id="bp" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Avg blood pressure</span>
                </div>

                <div class="input-group">
                    <label for="s1">S1</label>
                    <input type="number" id="s1" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Total cholesterol</span>
                </div>

                <div class="input-group">
                    <label for="s2">S2</label>
                    <input type="number" id="s2" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">LDL cholesterol</span>
                </div>

                <div class="input-group">
                    <label for="s3">S3</label>
                    <input type="number" id="s3" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">HDL cholesterol</span>
                </div>

                <div class="input-group">
                    <label for="s4">S4</label>
                    <input type="number" id="s4" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Chol / HDL ratio</span>
                </div>

                <div class="input-group">
                    <label for="s5">S5</label>
                    <input type="number" id="s5" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Log triglycerides</span>
                </div>

                <div class="input-group">
                    <label for="s6">S6</label>
                    <input type="number" id="s6" step="0.001" placeholder="0.000" required>
                    <span class="field-hint">Blood sugar level</span>
                </div>

            </div><!-- /.inputs-grid -->

            <div class="btn-row">
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">ANALYZE</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
                <button type="button" class="sample-btn" onclick="loadSample()">Sample</button>
                <button type="button" class="sample-btn" onclick="clearForm()">Clear</button>
            </div>

            <div id="errorBanner"></div>
        </form>

        <!-- Result -->
        <div id="resultArea" class="result-container">
            <div class="result-inner">
                <p class="score-label">Progression Score</p>
                <div class="score-value" id="scoreValue">—</div>
                <div class="risk-badge" id="riskBadge">—</div>
                <p class="risk-desc" id="riskDesc"></p>
                <div class="bar-labels">
                    <span>25</span><span>LOW</span><span>MED</span><span>HIGH</span><span>346</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill" id="barFill"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // ── Config ────────────────────────────────────────────────────────────────
    // nginx proxies /api/* → FastAPI container, so we use a relative path
    const API = '/api';

    const SAMPLE = {
        age:  0.038, sex:  0.051, bmi:  0.062, bp:   0.022,
        s1:  -0.044, s2:  -0.034, s3:  -0.043,
        s4:  -0.002, s5:   0.019, s6:  -0.018
    };

    const RISK_META = {
        Low:    { cls: 'low',    desc: 'Below-average progression predicted. Score in the lower third (25 – 131).'  },
        Medium: { cls: 'medium', desc: 'Average progression predicted. Score falls in the middle tercile (132 – 212).' },
        High:   { cls: 'high',   desc: 'Above-average progression predicted. Score in the upper third (213 – 346).'  }
    };

    // ── Health check ──────────────────────────────────────────────────────────
    (async function checkHealth() {
        try {
            const r = await fetch(API + '/');
            if (r.ok) {
                document.getElementById('statusDot').classList.add('online');
                const t = document.getElementById('statusText');
                t.textContent = 'API ONLINE';
                t.classList.add('online');
            }
        } catch {}
    })();

    // ── Load sample values ────────────────────────────────────────────────────
    function loadSample() {
        Object.entries(SAMPLE).forEach(([k, v]) => {
            document.getElementById(k).value = v;
        });
        hideError();
    }

    // ── Clear form ────────────────────────────────────────────────────────────
    function clearForm() {
        ['age','sex','bmi','bp','s1','s2','s3','s4','s5','s6'].forEach(k => {
            document.getElementById(k).value = '';
        });
        document.getElementById('resultArea').classList.remove('active');
        setTimeout(() => {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('barFill').style.width = '0%';
        }, 500);
        hideError();
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        // Collect + validate
        const fields = ['age','sex','bmi','bp','s1','s2','s3','s4','s5','s6'];
        const payload = {};
        for (const k of fields) {
            const v = parseFloat(document.getElementById(k).value);
            if (isNaN(v)) { showError('Please fill in all fields.'); return; }
            payload[k] = v;
        }

        // Loading state
        const btn    = document.getElementById('submitBtn');
        const text   = document.getElementById('btnText');
        const spin   = document.getElementById('btnSpinner');
        btn.disabled = true;
        text.style.display = 'none';
        spin.style.display = 'block';

        try {
            const res = await fetch(API + '/predict', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'HTTP ' + res.status);
            }

            const data = await res.json();
            showResult(data.predicted_score, data.risk_level);

        } catch (err) {
            showError('SYSTEM ERROR: ' + err.message);
        } finally {
            btn.disabled = false;
            text.style.display = 'inline';
            spin.style.display = 'none';
        }
    });

    // ── Render result ─────────────────────────────────────────────────────────
    function showResult(score, risk) {
        // Score
        document.getElementById('scoreValue').textContent = score.toFixed(1);

        // Risk badge
        const meta  = RISK_META[risk] || RISK_META['Medium'];
        const badge = document.getElementById('riskBadge');
        badge.textContent = risk.toUpperCase() + ' RISK';
        badge.className   = 'risk-badge ' + meta.cls;
        document.getElementById('riskDesc').textContent = meta.desc;

        // Progress bar (score range 25 – 346)
        const pct = Math.min(100, Math.max(0, ((score - 25) / (346 - 25)) * 100));
        setTimeout(() => {
            document.getElementById('barFill').style.width = pct + '%';
        }, 80);

        // Show card
        const area = document.getElementById('resultArea');
        area.style.display = 'block';
        requestAnimationFrame(() => {
            requestAnimationFrame(() => area.classList.add('active'));
        });
        area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Error helpers ─────────────────────────────────────────────────────────
    function showError(msg) {
        const el = document.getElementById('errorBanner');
        el.textContent  = '⚠ ' + msg;
        el.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorBanner').style.display = 'none';
    }
</script>

</body>
</html>
